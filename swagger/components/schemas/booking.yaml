type: object
required:
  - _id
  - hotelId
  - userId
  - checkIn
  - checkOut
  - guests
  - status
  - user
  - hotel
properties:
  _id:
    type: string
    example: 65e4decdd286b30065d54af9
  hotelId:
    type: string
    example: 65e4decdd286b30065d54af8
  userId:
    type: string
    example: 65e4decdd286b30065d54af7
  checkIn:
    type: string
    format: date
    example: '2025-06-01'
  checkOut:
    type: string
    format: date
    example: '2025-06-05'
  guests:
    type: integer
    minimum: 1
    example: 2
  status:
    type: string
    enum:
      - pending
      - confirmed
      - cancelled
      - completed
    example: confirmed
    description: >
      pending — очікує підтвердження;
      confirmed — підтверджено та оплачено;
      cancelled — скасовано;
      completed — завершено автоматично після дати виїзду.
  specialRequests:
    type: string
    example: 'Late check-in, non-smoking room preferred.'
  stripeSessionId:
    type: string
    description: Stripe Checkout Session ID. Заповнюється після успішної оплати через Stripe.
    example: cs_test_a1B2c3D4e5F6g7H8i9J0
  user:
    type: object
    required:
      - _id
      - name
      - email
    properties:
      _id:
        type: string
        example: 65e4decdd286b30065d54af7
      name:
        type: string
        example: John Doe
      email:
        type: string
        format: email
        example: john.doe@example.com
      phone:
        type: string
        example: '+380991234567'
  hotel:
    type: object
    required:
      - _id
      - title
      - location
      - price
    properties:
      _id:
        type: string
        example: 65e4decdd286b30065d54af8
      title:
        type: string
        example: Grand Hotel Vienna
      imageUrl:
        type: string
        example: https://res.cloudinary.com/demo/image/upload/sample.jpg
      location:
        type: string
        example: Vienna, Austria
      price:
        type: number
        example: 250
  createdAt:
    type: string
    format: date-time
    example: '2025-01-01T00:00:00.000Z'
  updatedAt:
    type: string
    format: date-time
    example: '2025-01-01T00:00:00.000Z'
