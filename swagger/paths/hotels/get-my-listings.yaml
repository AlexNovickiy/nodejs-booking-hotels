tags:
  - Hotels
summary: Get current user's hotel listings
operationId: getMyListings
description: Returns all hotel listings created by the currently authenticated user, sorted by creation date (newest first).
security:
  - bearerAuth: []
responses:
  '200':
    description: Successfully found user listings
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found user listings!
            data:
              type: array
              items:
                $ref: ../../components/schemas/hotel.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '500':
    $ref: ../../components/responses/500.yaml
