tags:
  - Hotels
summary: Get hotel by ID
operationId: getHotelById
description: Returns a single hotel with all details including reviews and ratings summary.
security: []
parameters:
  - in: path
    name: hotelId
    required: true
    schema:
      type: string
      example: 65e4decdd286b30065d54af9
    description: MongoDB ObjectId of the hotel
responses:
  '200':
    description: Successfully found hotel
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found hotel with id 65e4decdd286b30065d54af9!
            data:
              $ref: ../../components/schemas/hotel.yaml
  '400':
    $ref: ../../components/responses/400.yaml
  '404':
    $ref: ../../components/responses/404.yaml
  '500':
    $ref: ../../components/responses/500.yaml
