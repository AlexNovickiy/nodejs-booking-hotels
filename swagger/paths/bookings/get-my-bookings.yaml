tags:
  - Bookings
summary: Get current user's bookings
operationId: getMyBookings
description: Returns all bookings made by the currently authenticated user, sorted by check-in date ascending.
security:
  - bearerAuth: []
responses:
  '200':
    description: Successfully found user bookings
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found user bookings!
            data:
              type: array
              items:
                $ref: ../../components/schemas/booking.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '500':
    $ref: ../../components/responses/500.yaml
