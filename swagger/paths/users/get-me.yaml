tags:
  - Users
summary: Get current user profile
operationId: getMe
description: Returns the profile of the currently authenticated user. Password is never included in the response.
security:
  - bearerAuth: []
responses:
  '200':
    description: Successfully fetched user profile
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully fetched user profile!
            data:
              $ref: ../../components/schemas/user.yaml
  '401':
    $ref: ../../components/responses/401.yaml
  '404':
    $ref: ../../components/responses/404.yaml
  '500':
    $ref: ../../components/responses/500.yaml
